name: "Compile Flipper Application"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout user application
        uses: actions/checkout@v4
        with:
          path: user_app

      - name: Checkout Flipper Zero Firmware
        uses: actions/checkout@v4
        with:
          repository: flipperdevices/flipperzero-firmware
          ref: release
          path: flipper-firmware
          submodules: recursive
          fetch-depth: 0

      - name: Copy specific app files to firmware structure
        run: |
          mkdir -p flipper-firmware/applications_user/subghz_advanced
          # On ne copie que les fichiers utiles pour le compilateur
          cp user_app/main.c flipper-firmware/applications_user/subghz_advanced/ 2>/dev/null || cp user_app/subghz_advanced/main.c flipper-firmware/applications_user/subghz_advanced/
          cp user_app/application.fam flipper-firmware/applications_user/subghz_advanced/ 2>/dev/null || cp user_app/subghz_advanced/application.fam flipper-firmware/applications_user/subghz_advanced/

      - name: Set up Environment & Build FAP
        run: |
          cd flipper-firmware
          # Initialise l'environnement virtuel python nécessaire à fbt
          ./fbt env
          # Lance la compilation
          ./fbt fap_subghz_advanced

      - name: Upload Compiled FAP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: subghz_advanced_fap
          path: flipper-firmware/build/f7-firmware-*/apps/subghz_advanced.fap
